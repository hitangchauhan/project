<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="User Profile - Gaytri Flour Mill">
    <title>My Profile | Gaytri Flour Mill</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <style>
        .profile-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .profile-container {
                flex-direction: row;
                align-items: flex-start;
            }
        }

        .profile-sidebar {
            background: white;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, .15);
            flex: 1;
            min-width: 250px;
        }

        .user-greeting {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #8B0000;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
        }

        .profile-main {
            flex: 3;
            background: white;
            padding: 24px;
            border-radius: 4px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, .15);
        }

        .profile-main h2 {
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .order-card {
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            transition: box-shadow 0.2s;
        }

        .order-card:hover {
            box-shadow: 0 2px 6px 0 rgba(0, 0, 0, .1);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #e0e0e0;
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #666;
        }

        .order-status {
            font-weight: bold;
            color: #26a541;
            /* Green for success/ready, can be dynamic */
        }

        .order-total {
            font-size: 16px;
            font-weight: bold;
            color: #212121;
            margin-top: 15px;
            text-align: right;
        }

        .order-items {
            list-style: none;
            padding: 0;
        }

        .order-items li {
            padding: 8px 0;
            font-size: 15px;
            color: #333;
            display: flex;
            justify-content: space-between;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #878787;
        }
    </style>
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header class="header">
        <nav class="navbar">

            <div class="logo">
                <a href="index.html"
                    style="color:white; text-decoration:none; display:flex; align-items:center; gap:10px;">
                    <img src="images/logo.png" alt="Gaytri Flour Mill Logo">
                    <span>Gaytri Flour Mill</span>
                </a>
            </div>

            <div class="menu-toggle" onclick="toggleMenu()">☰</div>

            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

        </nav>
    </header>

    <!-- ================= PROFILE CONTENT ================= -->
    <section class="section" style="background-color: #f1f3f6; min-height: 80vh; padding: 40px 0;">
        <div class="container profile-container">

            <!-- Sidebar -->
            <aside class="profile-sidebar">
                <div class="user-greeting">
                    <div class="avatar" id="userAvatar">U</div>
                    <div>
                        <div style="font-size: 12px; color: #878787;">Hello,</div>
                        <div style="font-size: 16px; font-weight: bold; color: #333;" id="userNameSidebar">User Name
                        </div>
                    </div>
                </div>

                <ul style="list-style: none;">
                    <li style="padding: 10px 0; border-bottom: 1px solid #f0f0f0;">
                        <a href="#" style="text-decoration: none; color: #8B0000; font-weight: 500;">🛒 My Orders</a>
                    </li>
                </ul>
            </aside>

            <!-- Main Content (Orders) -->
            <main class="profile-main">
                <h2>My Orders</h2>

                <div id="ordersContainer">
                    <p>Loading your orders...</p>
                </div>
            </main>

        </div>
    </section>

    <!-- ================= FOOTER ================= -->
    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-logo">
                <img src="images/logo.png" alt="Gaytri Flour Mill Logo">
                <h3>Gaytri Flour Mill</h3>
            </div>
            <div class="footer-info">
                <p>Delivering Quality Flour & Salt with Trust and Purity</p>
                <p>Limbdi, Gujarat, India</p>
                <p>© 2026 Gaytri Flour Mill & Salt Suppliers. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById("navLinks").classList.toggle("show");
        }
    </script>
</body>

</html>
